{% extends 'base.html' %}
{% block title %}Delete Service — LocalServe{% endblock %}

{% block content %}
<div class="container section" style="max-width:480px">
  <div class="card" style="padding:36px;text-align:center">
    <div style="font-size:3rem;margin-bottom:16px">🗑️</div>
    <h1 style="font-family:var(--font-head);font-size:1.4rem;font-weight:700;margin-bottom:10px">Delete Service?</h1>
    <p style="color:var(--text-secondary);margin-bottom:28px">
      Are you sure you want to delete <strong style="color:var(--text-primary)">{{ service.title }}</strong>?
      This action cannot be undone.
    </p>
    <form method="post" style="display:flex;gap:12px;justify-content:center">
      {% csrf_token %}
      <button type="submit" class="btn btn--danger">Yes, Delete</button>
      <a href="{% url 'services:provider_dashboard' %}" class="btn btn--outline">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
